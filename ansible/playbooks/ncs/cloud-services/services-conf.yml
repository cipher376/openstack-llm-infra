---
#--------------------------------------------------------------------------------#
# Setup vm nodes with terraform
#--------------------------------------------------------------------------------#
- name: Set up vm nodes with terraform
  hosts: localhost
  vars_files: 
    - ../../../../secrets/vault.yml   
    - ../../../vars.yml    
  tags:
    - services
  tasks:
    - name: Get image information by name
      openstack.cloud.image_info:
        image: "{{ ubuntu_image }}"
      register: image_search

    - name: Set the Image ID as a fact
      set_fact:
        target_image_id: "{{ image_search.images[0].id }}"
      when: image_search.images | length > 0

    - name: Debug the ID
      debug:
        msg: "The ID for target image is {{ target_image_id }}"
      when: target_image_id is defined
    
    - name: Deploy services vm
      community.general.terraform:
        project_path: "../../../../terraform/cloud-services"
        state: present
        force_init: yes
        variables:
          auth_url: "{{ os_auth_url }}"
          region: "{{ os_region_name }}"
          internal_network: "{{ internal_network }}"
          subnet: "{{ service_net }}"
          pinhole_admin_pass: "{{ pihole_admin_pass }}"
          vm_ipv4: "{{ cloud_service_vm_IPv4 }}"
          image_uuid: "{{ target_image_id }}"
          ssh_key_file: "{{ local_public_key }}"
          key_pair: "{{ default_key_pair }}"

  

- name: Wait for vault vm to become ready
  hosts: cloud_services
  gather_facts: no  # Must be no, because we can't gather facts if SSH is down!
  vars_files: 
    - ../../../../secrets/vault.yml   
    - ../../../vars.yml 
  tags:
    - services
  tasks:
    - name: Dynamically update inventory for the next play
      add_host:
        name: "cloud-services"
        groups: "reinitialized_nodes"
        ansible_user: "ubuntu"
        ansible_ssh_host: "{{ cloud_service_vm_IPv4 }}"
        # Ensure it uses your private key
        ansible_ssh_private_key_file: "{{ local_private_key }}"
        # Since IPs might cycle, ignore strict host key checking for now
        ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"

    - name: Ensure SSH is responding
      wait_for:
        host: cloud-services
        port: 22
        timeout: 60
      ignore_errors: true
      delegate_to: localhost
      remote_user: ubuntu
      vars:
        ansible_ssh_extra_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"



- name: Deploy Cloud Services Stack
  hosts: cloud_services
  gather_facts: true  
  become: true
  vars:
    project_path: "/opt/cloud-services"
    unbound_conf_dir: "{{ project_path }}/unbound/conf"

  vars_files: 
    - ../../../../secrets/vault.yml   
    - ../../../vars.yml  
  tags:
    - services
    - services-config
  tasks:
    
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 0

    - name: Install Docker and Dependencies
      apt:
        name: 
          - docker.io
          - docker-compose-v2
          - curl 
          - git
          - net-tools      # For ifconfig, route
          - iputils-ping   # For ping
          - traceroute     # To trace packet hops
          - tcpdump        # To sniff traffic on br-ex or br-int
          - dnsutils       # For nslookup and dig (vital for testing Unbound)
          - iproute2       # For ip addr, ip link, ip netns (OpenStack namespaces)
        state: present
      retries: 3
      delay: 5

    - name: Get VM details
      openstack.cloud.server_info:
        server: "bastion-server"
      register: vm_details
      delegate_to: localhost
      become: no

    - name: Extract Floating IP
      set_fact:
        external_ip: "{{ (vm_details.servers[0].addresses.values() | flatten | selectattr('OS-EXT-IPS:type', 'equalto', 'floating') | map(attribute='addr') | list) | first }}"
        cacheable: yes
      delegate_to: localhost
      become: no
      
    - name: Verify Floating IP was captured
      assert:
        that:
          - external_ip is not none
        fail_msg: "Floating IP not found!."
      delegate_to: localhost
      become: no

      
    - name: Display the External IP
      debug:
        msg: "The external (Floating) IP for the VM is: {{ external_ip | default('None Assigned') }}"
      delegate_to: localhost
      become: no


    - name: Ensure parent directory for Pi-hole custom.list exists
      file:
        path: "{{ project_path }}/pihole"
        state: directory
        mode: '0755'

    - name: Inject Local DNS records into Pi-hole
      ansible.builtin.blockinfile:
        path: "{{ project_path }}/pihole/custom.list" # Update this to your host path for Pi-hole config
        create: yes
        marker: "# {mark} ANSIBLE MANAGED LAN RECORDS"
        block: |
          {{ external_ip }} argocd.ncs-cloud.lan
          {{ external_ip }} bastion-server.ncs-cloud.lan
          {{ external_ip }} dns.ncs-cloud.lan
          {{ external_ip }} wireguard.ncs-cloud.lan
          {{ external_ip }} fproxy.ncs-cloud.lan
          {{ external_ip }} vault.ncs-cloud.lan
          {{ external_ip }} gitlab.ncs-cloud.lan
          {{ external_ip }} grafana.ncs-cloud.lan
          {{ external_ip }} hubble.ncs-cloud.lan
          {{ external_ip }} master.seaweedfs.ncs-cloud.lan
          {{ external_ip }} prometheus.ncs-cloud.lan
          {{ external_ip }} s3.seaweedfs.ncs-cloud.lan
          {{ external_ip }} uptime.ncs-cloud.lan

          
          {{ cilium_gateway }}  argocd.internal.ncs-cloud.lan
          10.10.10.10  bastion-server.internal.ncs-cloud.lan
          10.10.40.3   cloud-services.internal.ncs-cloud.lan
          10.10.40.3   dns.internal.ncs-cloud.lan
          10.10.40.3   wireguard.internal.ncs-cloud.lan
          10.10.10.10  fproxy.internal.ncs-cloud.lan
          10.10.40.4   vault.internal.ncs-cloud.lan
          10.10.20.3   filer.seaweedfs.internal.ncs-cloud.lan
          10.10.20.4   gitlab-server.internal.ncs-cloud.lan
          10.10.30.10  gpu-worker-01.internal.ncs-cloud.lan
          {{ cilium_gateway }}  grafana.internal.ncs-cloud.lan
          {{ cilium_gateway }}  hubble.internal.ncs-cloud.lan
          10.10.30.13  inference-worker-01.internal.ncs-cloud.lan
          10.10.30.3   k3s-master-01.internal.ncs-cloud.lan
          10.10.30.11  k3s-worker-01.internal.ncs-cloud.lan
          10.10.30.12  k3s-worker-02.internal.ncs-cloud.lan
          10.10.20.3   master.seaweedfs.internal.ncs-cloud.lan
          10.10.10.4   mgmt-vault.internal.ncs-cloud.lan
          {{ cilium_gateway }}  prometheus.internal.ncs-cloud.lan
          10.10.20.3   s3.seaweedfs.internal.ncs-cloud.lan
          10.10.20.3   seaweedfs.internal.ncs-cloud.lan
          10.10.40.3   uptime.internal.ncs-cloud.lan
      register: pihole_dns
    - name: Ensure dnsmasq configuration directory exists for Pi-hole
      file:
        path: "{{ project_path }}/pihole/dnsmasq.d"
        state: directory
        mode: '0755'

    - name: Add allow-queries directive to permit DNS from 10.0.0.0/8
      copy:
        dest: "{{ project_path }}/pihole/dnsmasq.d/99-allow-local.conf"
        content: |
          # Allow DNS queries from the 10.0.0.0/8 network
          allow-queries=10.0.0.0/8
        owner: root
        group: root
        mode: '0644'
      notify: restart pihole

    - name: Create Unbound configuration directory
      file:
        path: "{{ unbound_conf_dir }}"
        state: directory
        mode: '0755'
    
    - name: Download the latest Root Hints (Authoritative Source)
      get_url:
        url: https://www.internic.net/domain/named.root
        dest: "{{ unbound_conf_dir }}/root.hints"
        mode: '0644'

    - name: Configure Unbound for Pi-hole recursion
      ansible.builtin.copy:
        dest: "{{ unbound_conf_dir }}/unbound-pi-hole.conf"
        content: |
          server:
            # Listen on all interfaces inside the container
            interface: 0.0.0.0
            port: 5335
            do-ip4: yes
            do-udp: yes
            do-tcp: yes

            # CRITICAL: This must be the path INSIDE the container
            root-hints: "/opt/unbound/etc/unbound/root.hints"

            # Security: Hide identity/version
            hide-identity: yes
            hide-version: yes

            # Privacy: Enable DNSSEC validation
            harden-glue: yes
            harden-dnssec-stripped: yes
            use-caps-for-id: yes

            # Performance for your specs
            num-threads: 1
            msg-cache-slabs: 4
            rrset-cache-slabs: 4
            infra-cache-slabs: 4
            key-cache-slabs: 4

            # Access Control: Docker needs to allow its own bridge network
            access-control: 127.0.0.0/8 allow
            access-control: 172.16.0.0/12 allow
            access-control: 192.168.0.0/16 allow
            access-control: 10.0.0.0/8 allow
            

            # Cache sizes (optimized for your 40GB RAM)
            rrset-cache-size: 256m
            msg-cache-size: 128m
      register: unbound_config


    - name: Deploy Docker Compose file
      copy:
        dest: "{{ project_path }}/docker-compose.yml"
        content: |
          services:
            pihole:
              container_name: pihole
              image: pihole/pihole:latest
              ports:
                - "53:53/tcp"
                - "53:53/udp"
                - "80:80/tcp"
              environment:
                TZ: 'America/Edmonton'
                # Use Unbound via Docker bridge networking
                PIHOLE_DNS_: 'unbound#5335' 
                FTLCONF_webserver_api_password: '{{ pihole_admin_pass }}'
                FTLCONF_dns_hosts: '/etc/pihole/hosts/custom.list'
                FTLCONF_dns_listeningMode: 'ALL'
                # Required for cross-subnet/VPC resolution
                DNSMASQ_LISTENING: 'all'
                DNSMASQ_ALLOW_NON_LOCAL: 'true'
                INTERFACE: ens3
              volumes:
                - '{{ project_path }}/pihole/custom.list:/etc/pihole/hosts/custom.list'
                - '{{ project_path }}/pihole/dnsmasq.d/99-allow-local.conf:/etc/dnsmasq.d/99-allow-local.conf' 
                - pihole_config:/etc/pihole
              restart: always

            unbound:
              image: mvance/unbound:latest
              container_name: unbound
              restart: always
              # You technically don't need to expose 5335 to the host anymore 
              # since Pi-hole talks to it over the internal bridge, but it's fine for testing.
              ports:
                - "5335:5335/tcp"
                - "5335:5335/udp"
              volumes:
                # Quote the volume paths to prevent YAML parsing errors with variables
                - "{{ unbound_conf_dir }}/unbound-pi-hole.conf:/opt/unbound/etc/unbound/unbound.conf"
                - "{{ unbound_conf_dir }}/root.hints:/opt/unbound/etc/unbound/root.hints"
              healthcheck:
                # Using localhost check is safer if external DNS is flaky during boot
                test: ["CMD-SHELL", "drill -p 5335 localhost @127.0.0.1 || exit 1"]
                interval: 30s
                timeout: 10s
                retries: 3

            uptime-kuma:
              container_name: uptime-kuma
              image: louislam/uptime-kuma:1
              ports:
                - "3001:3001/tcp"
              # Point Kuma directly to the Pi-hole container for resolution
              dns: 127.0.0.1
              volumes:
                - uptime-kuma:/app/data
              restart: always

            wireguard:
              container_name: wireguard
              image: lscr.io/linuxserver/wireguard:latest
              cap_add: [NET_ADMIN, SYS_MODULE]
              environment:
                PUID: 1000
                PGID: 1000
                TZ: America/Edmonton
                SERVERPORT: 51820
                # PEER_DNS should point to your Pi-hole so VPN clients get ad-blocking
                PEER_DNS: "{{ cloud_service_vm_IPv4 }}"
              ports:
                - "51820:51820/udp"
              volumes:
                - /opt/wireguard/config:/config
                - /lib/modules:/lib/modules
              restart: always

          volumes:
            uptime-kuma:
            pihole_config:

    - name: Disable systemd-resolved to free Port 53
      service:
        name: systemd-resolved
        state: stopped
        enabled: no

    - name: Remove immutable flag if it exists (unlock file)
      command: chattr -i /etc/resolv.conf
      ignore_errors: yes
      changed_when: false

    - name: Set static DNS for the host itself
      copy:
        dest: /etc/resolv.conf
        content: |
          nameserver 127.0.0.1
          nameserver 172.16.20.1
          nameserver 1.0.0.1
          nameserver 1.1.1.1
          search ncs-cloud.lan internal.ncs-cloud.lan
    
    - name: Re-apply immutable flag (prevent DHCP/System overwrite)
      command: chattr +i /etc/resolv.conf
      ignore_errors: yes

    - name: Create project directory
      file:
        path: "{{ project_path }}"
        state: directory
        mode: '0755'

    - name: Add hostname mapping
      lineinfile:
        path: /etc/hosts
        line: "127.0.0.1 {{ inventory_hostname }}"
        insertafter: '^127\.0\.0\.1\s+localhost'
        
    - name: Start the Services
      ansible.builtin.shell: "docker compose -f {{ project_path }}/docker-compose.yml up -d --force-recreate"
      async: 600          # Allow up to 10 minutes (prevents the 30s timeout)
      poll: 10            # Check status every 10 seconds
      register: docker_up
      until: docker_up.rc == 0
      retries: 5          # Retry if the command itself fails
      delay: 10

    
  handlers:
    - name: restart pihole
      ansible.builtin.command:
        cmd: "docker compose -f {{ project_path }}/docker-compose.yml restart pihole"
      listen: "restart pihole"

    
    

  
