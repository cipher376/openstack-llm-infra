#==========================Grafana============================================
    - name: Configure Services  access (Grafana)
      copy:
        dest: /etc/nginx/sites-available/grafana-proxy
        content: |
            server {
                listen 80;
                server_name {{ grafana_external_url }};
                resolver {{ local_dns_IPv4 }} valid=30s;

                location / {   
                    set $upstream_service "http://{{ grafana_url }}";
                    proxy_pass $upstream_service;

                    # Standard Proxy Headers
                    proxy_set_header Host {{ grafana_url }};
                    proxy_set_header X-Forwarded-Server $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                    # This is the "Secret Sauce" for Grafana UI/API
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_set_header Origin http://{{ grafana_url }};

                    # WebSocket support 
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";

                    proxy_connect_timeout 60s;
                    proxy_send_timeout 60s;
                    proxy_read_timeout 60s;

                    client_max_body_size 10M;

                }
            }
      notify: "nginx config changed"

    - name: Enable grafana proxy site
      file:
        src: /etc/nginx/sites-available/grafana-proxy
        dest: /etc/nginx/sites-enabled/grafana-proxy
        state: link
      notify: "nginx config changed"  