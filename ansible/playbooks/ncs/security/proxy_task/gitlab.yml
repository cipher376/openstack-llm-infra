 
    - name: Configure Nginx reverse proxy for GitLab
      copy:
        dest: /etc/nginx/sites-available/gitlab-proxy
        content: |
          server {
              listen 80;
              server_name {{ gitlab_external_url }};
              return 301 https://$host$request_uri;
          }

          server {
              listen 443 ssl http2;
              server_name {{ gitlab_external_url }};

              ssl_certificate     /etc/nginx/ssl/selfsigned/fullchain.pem;
              ssl_certificate_key /etc/nginx/ssl/selfsigned/privkey.pem;
              ssl_protocols       TLSv1.2 TLSv1.3;
              ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
              ssl_prefer_server_ciphers on;

              client_max_body_size 10G;
              resolver {{ local_dns_IPv4 }} valid=30s;

              location / {
                  set $upstream_service "http://{{ gitlab_url }}";
                  proxy_pass $upstream_service;

                  # Standard headers – critical for GitLab
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto https;   # tells GitLab "https"
                  proxy_set_header X-Forwarded-Ssl on;

                  # WebSocket support
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";

                  # Timeouts
                  proxy_read_timeout 300;
                  proxy_connect_timeout 300;
                  proxy_send_timeout 300;
                  proxy_buffering off;
              }
          }
      notify: "nginx config changed"