    - name: Configure Services  access (dns, vpn)
      copy:
        dest: /etc/nginx/sites-available/pihole-proxy
        content: |
          # Redirect HTTP → HTTPS
          server {
              listen 80;
              server_name {{ pihole_external_url }};
              return 301 https://$host$request_uri;
          }
          
          # HTTPS server block (SSL termination)
          server {
              listen 443 ssl http2;
              server_name {{ pihole_external_url }};
          
              # Self‑signed certificate paths (adjust as needed)
              ssl_certificate     /etc/nginx/ssl/selfsigned/fullchain.pem;
              ssl_certificate_key /etc/nginx/ssl/selfsigned/privkey.pem;
          
              # Basic SSL settings for testing (optional but recommended)
              ssl_protocols       TLSv1.2 TLSv1.3;
              ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
              ssl_prefer_server_ciphers on;
          
              resolver {{ local_dns_IPv4 }} valid=30s;
          
              # 1. Immediate redirect from / to /admin/
              location = / {
                  return 301 /admin/;
              }
          
              # 2. Pi-hole Admin Interface
              location /admin/ {
                  set $upstream_pihole "http://{{ pihole_url }}"; 
                  proxy_pass $upstream_pihole;
          
                  include /etc/nginx/proxy_params;
          
                  # Rewrite redirects from internal HTTP to external HTTPS
                  proxy_redirect http://{{ pihole_url }}/ https://$host/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Forwarded-Proto $scheme;   # tells Pi-hole the original protocol is HTTPS
              }
          
              # 3. Handle API and other assets
              location / {
                  set $upstream_root "http://{{ pihole_url }}";
                  proxy_pass $upstream_root;
          
                  include /etc/nginx/proxy_params;
                  proxy_redirect http://{{ pihole_url }}/ https://$host/;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
      notify: "nginx config changed"

    - name: Enable Pi-hole proxy site
      file:
        src: /etc/nginx/sites-available/pihole-proxy
        dest: /etc/nginx/sites-enabled/pihole-proxy
        state: link
      notify: "nginx config changed"

