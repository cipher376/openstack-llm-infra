    - name: Configure Services  access (uptime)
      copy:
        dest: /etc/nginx/sites-available/uptime-proxy
        content: |
            # Redirect HTTP → HTTPS
            server {
                listen 80;
                server_name {{ uptime_external_url }};
                return 301 https://$host$request_uri;
            }

            # HTTPS server block (SSL termination)
            server {
                listen 443 ssl http2;
                server_name {{ uptime_external_url }};

                # Self‑signed certificate paths (adjust as needed)
                ssl_certificate     /etc/nginx/ssl/selfsigned/fullchain.pem;
                ssl_certificate_key /etc/nginx/ssl/selfsigned/privkey.pem;

                # Basic SSL settings for testing
                ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
                ssl_prefer_server_ciphers on;

                resolver {{ local_dns_IPv4 }} valid=30s;

                location / {
                    set $upstream_service "http://{{ uptime_url }}:3001";
                    proxy_pass $upstream_service;

                    # WebSocket Support (CRITICAL)
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";

                    # Standard Headers
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;   # now "https"

                    # Timeouts for long-lived WebSocket connections
                    proxy_read_timeout 86400s;
                    proxy_send_timeout 86400s;
                }
            }
      notify: "nginx config changed"

    - name: Enable uptime-kuma proxy site
      file:
        src: /etc/nginx/sites-available/uptime-proxy
        dest: /etc/nginx/sites-enabled/uptime-proxy
        state: link
      notify: "nginx config changed"
