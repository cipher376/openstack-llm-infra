#==========================Kubeflow============================================
    - name: Configure Services access (Kubeflow)
      copy:
        dest: /etc/nginx/sites-available/kubeflow-proxy
        content: |
            # Redirect HTTP → HTTPS
            server {
                listen 80;
                server_name {{ kubeflow_external_url }};
                return 301 https://$host$request_uri;
            }

            # HTTPS server block
            server {
                listen 443 ssl http2;
                server_name {{ kubeflow_external_url }};

                # Self‑signed certificate paths (adjust as needed)
                ssl_certificate     /etc/nginx/ssl/selfsigned/fullchain.pem;
                ssl_certificate_key /etc/nginx/ssl/selfsigned/privkey.pem;

                # Strong SSL settings
                ssl_protocols       TLSv1.2 TLSv1.3;
                ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
                ssl_prefer_server_ciphers on;

                resolver {{ local_dns_IPv4 }} valid=30s;

                location / {
                    set $upstream_service "http://{{ kubeflow_url }}";
                    proxy_pass $upstream_service;

                    # Essential headers to maintain the host and original IP information
                    proxy_set_header Host {{ kubeflow_url }};
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto https;   

                    # WebSocket support (Required for Kubeflow dashboards/notebooks)
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "Upgrade";

                    # Prevent timeout issues with long-running notebook sessions
                    proxy_read_timeout 86400;
                    proxy_send_timeout 86400;
                }
            }
      notify: "nginx config changed"

    - name: Enable kubeflow proxy site
      file:
        src: /etc/nginx/sites-available/kubeflow-proxy
        dest: /etc/nginx/sites-enabled/kubeflow-proxy
        state: link
      notify: "nginx config changed" 

