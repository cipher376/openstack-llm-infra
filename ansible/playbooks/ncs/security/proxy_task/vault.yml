    - name: Configure Services access (Vault)
      copy:
        dest: /etc/nginx/sites-available/vault-proxy
        content: |
            # Redirect HTTP → HTTPS
            server {
                listen 80;
                server_name {{ vault_external_url }};
                return 301 https://$host$request_uri;
            }
    
            # HTTPS server block
            server {
                listen 443 ssl http2;
                server_name {{ vault_external_url }};
    
                # Self‑signed certificate paths (adjust as needed)
                ssl_certificate     /etc/nginx/ssl/selfsigned/fullchain.pem;
                ssl_certificate_key /etc/nginx/ssl/selfsigned/privkey.pem;
    
                # Strong SSL settings
                ssl_protocols       TLSv1.2 TLSv1.3;
                ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
                ssl_prefer_server_ciphers on;
    
                resolver {{ local_dns_IPv4 }} valid=30s;
    
                # 1. Force redirect from the root / to /ui/
                location = / {
                    return 301 /ui/;
                }
    
                # 2. Handle all other requests (UI assets and API calls)
                location / {
                    set $upstream_service "http://{{ vault_url }}:8200";
                    proxy_pass $upstream_service;
    
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;   # now "https"
                    proxy_set_header X-Forwarded-Ssl on;
                    
                    # WebSocket support (Crucial for Vault UI)
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
    
                    # Vault Specifics
                    proxy_connect_timeout 60s;
                    proxy_read_timeout 60s;
                    client_max_body_size 10M;
    
                    # Ensure that Nginx correctly handles redirects sent by Vault
                    proxy_redirect off;
                }
            }
      notify: "nginx config changed"
    
    - name: Enable vault proxy site
      file:
        src: /etc/nginx/sites-available/vault-proxy
        dest: /etc/nginx/sites-enabled/vault-proxy
        state: link
      notify: "nginx config changed"