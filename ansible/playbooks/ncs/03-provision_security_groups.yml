---
- name: Provision OpenStack Security Groups on NCS
  hosts: localhost
  gather_facts: false
  vars:
    # Match these to your environment
    cloud_name: NCS 
    network_name: k3s-private-net
    subnet_name: k3s-private-subnet
    cidr: 10.0.0.0/24
    
  tasks:
    
    # 1. Security Group: Internal Mesh (Cilium & K3s)
    - name: Create Internal Mesh Security Group
      openstack.cloud.security_group:
        name: sg-k3s-internal
        description: "Internal cluster communication for Cilium and K3s"

    - name: Add Cilium & K3s Internal Rules
      openstack.cloud.security_group_rule:
        security_group: sg-k3s-internal
        protocol: "{{ item.proto }}"
        port_range_min: "{{ item.port_min }}"
        port_range_max: "{{ item.port_max }}"
        remote_ip_prefix: "{{ cidr }}"
      loop:
        - { proto: 'udp', port_min: 8472, port_max: 8472, desc: 'VXLAN Overlay' }
        - { proto: 'tcp', port_min: 4240, port_max: 4240, desc: 'Cilium Health' }
        - { proto: 'tcp', port_min: 6443, port_max: 6443, desc: 'K3s API' }
        - { proto: 'tcp', port_min: 2379, port_max: 2380, desc: 'etcd HA' }
        - { proto: 'icmp', port_min: -1, port_max: -1, desc: 'Cilium Health Ping' }

    # 2. Security Group: Vault (Standalone / Multi-Cloud Hub)
    - name: Create Vault Security Group
      openstack.cloud.security_group:
        name: sg-vault
        description: "HashiCorp Vault API and Cluster replication"

    - name: Add Vault Internal & Replication Rules
      openstack.cloud.security_group_rule:
        security_group: sg-vault
        protocol: tcp
        port_range_min: "{{ item }}"
        port_range_max: "{{ item }}"
        remote_ip_prefix: "{{ cidr }}"
      loop:
        - 8200 # Vault API
        - 8201 # Raft Cluster Replication


    # 3. Security Group: Management (GitLab & ArgoCD)
    - name: Create Management Security Group
      openstack.cloud.security_group:
        name: sg-management
        description: "External access for GitLab and ArgoCD"

    - name: Add Management External Rules
      openstack.cloud.security_group_rule:
        security_group: sg-management
        protocol: tcp
        port_range_min: "{{ item }}"
        port_range_max: "{{ item }}"
        remote_ip_prefix: 0.0.0.0/0
      loop:
        - 22   # SSH
        - 80   # HTTP
        - 443  # HTTPS
        - 5050 # GitLab Registry

    # 4. Security Group: Storage (SeaweedFS)
    - name: Create Storage Security Group
      openstack.cloud.security_group:
        name: sg-storage
        description: "SeaweedFS S3 and Filer access"

    - name: Add SeaweedFS Rules
      openstack.cloud.security_group_rule:
        security_group: sg-storage
        protocol: tcp
        port_range_min: "{{ item }}"
        port_range_max: "{{ item }}"
        remote_ip_prefix: "{{ cidr }}"
      loop:
        - 8333  # Seaweed S3 API
        - 9333  # Seaweed Master
        - 8888  # Seaweed Filer UI

    # - name: Allow Cloud Peers to access Vault API
    #   openstack.cloud.security_group_rule:
    #     
    #     security_group: sg-vault
    #     protocol: tcp
    #     port_range_min: 8200
    #     port_range_max: 8200
    #     remote_ip_prefix: "{{ item }}"
    #   loop: "{{ cloud_peers }}"