---
- name: Pull and Push Cloud Images
  hosts: localhost
  connection: local
  gather_facts: false
  tags:
    - update-image

  vars:
    image_cache_dir: "/tmp/openstack_images"
    
    images:
      # Updated to a more reliable 3.19 path
      - name: "Alpine-3.23-Cloud"
        url: "https://dl-cdn.alpinelinux.org/alpine/v3.23/releases/cloud/nocloud_alpine-3.23.3-x86_64-bios-cloudinit-r0.qcow2"
        filename: "alpine-3.23.qcow2"
        
      # Using the 'current' symlink for Ubuntu 24.04 (Noble)
      - name: "Ubuntu-24.04-Minimal"
        url: "https://cloud-images.ubuntu.com/minimal/releases/noble/release/current/ubuntu-24.04-minimal-cloudimg-amd64.img"
        filename: "ubuntu-24-minimal.img"
        
      - name: "Debian-12-Cloud"
        url: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2"
        filename: "debian-12.qcow2"

  tasks:
    - name: Ensure image cache directory exists
      ansible.builtin.file:
        path: "{{ image_cache_dir }}"
        state: directory

    - name: Check local cache
      ansible.builtin.stat:
        path: "{{ image_cache_dir }}/{{ item.filename }}"
      loop: "{{ images }}"
      register: image_results

    - name: Download missing images
      ansible.builtin.get_url:
        url: "{{ item.item.url }}"
        dest: "{{ image_cache_dir }}/{{ item.item.filename }}"
        mode: '0644'
      loop: "{{ image_results.results }}"
      # Fix: Accessing the stat result from the registered loop
      when: not item.stat.exists

    - name: Upload to OpenStack
      openstack.cloud.image:
        state: present
        name: "{{ item.item.name }}"
        container_format: bare
        disk_format: "qcow2"
        filename: "{{ image_cache_dir }}/{{ item.item.filename }}"
        is_public: true
        # Ensure it hits your HDD tier
        properties:
          cinder_img_volume_type: "ncs-hdd"
      loop: "{{ image_results.results }}"
      # This ensures we don't try to upload if the download failed or was skipped
      when: 
        - not ansible_check_mode
        - (item.stat.exists or hostvars['localhost']['download_task'] is not failed)