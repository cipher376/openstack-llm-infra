# =============================================================================
# Play 1: INSTALL ARGOCD
# =============================================================================

- name: "Install and Configure ArgoCD"
  hosts: k3s_master
  become: false
  vars_files:
    - ../../../../secrets/vault.yml   
    - ../../../vars.yml
  vars:
    gitlab_argocd_token: "{{gitlab_group_token}}"
    gitlab_argo_group_name: "{{gitlab_group_name}}"
    gateway: "cilium-gateway"
  tags:
    - argocd
  tasks:
    - name: Validate GitLab Deployement token
      assert:
        that:
          - gitlab_argocd_token is defined
          - gitlab_argocd_token | length > 20
          - gitlab_argocd_token is search('^glpat-') # Ensures it's not a raw string
        fail_msg: "Deployment token is missing or incorrectly decrypted! Ensure you used --vault-password-file."
        success_msg: "GitLab Deployment token validated successfully."

    - name: Add ArgoCD Helm Repository
      kubernetes.core.helm_repository:
        name: argo
        repo_url: "https://argoproj.github.io/argo-helm"
      # This ensures the repo is added to the Helm config on the master node


    - name: Deploy ArgoCD via Helm
      kubernetes.core.helm:
        name: argocd
        chart_ref: argo/argo-cd
        release_namespace: argocd
        create_namespace: true
        # In a lab, we often disable forced TLS to make Ingress easier
        values:
          server:
            extraArgs:
              - --insecure 
          configs:
            params:
              server.insecure: "true"
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    

    - name: Wait for ArgoCD Server to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        wait: yes
        namespace: argocd
        label_selectors:
          - app.kubernetes.io/name=argocd-server
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml


    - name: Expose ArgoCD via Cilium Gateway
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: argocd-route
            namespace: argocd
          spec:
            parentRefs:
              - name: "{{ gateway }}"
                namespace: kube-system
            hostnames:
              - "argocd.ncs-cloud.lan"
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
                backendRefs:
                  - name: argocd-server
                    port: 80
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    


    
# =============================================================================
# Play 2: Configure initial policies for Argocd
# =============================================================================

- name: Configure Standalone Vault for ArgoCD
  hosts:   cluster-vault # Run from control node or any host that can reach Vault IP
  become: true
  gather_facts: true
  vars_files:
    - ../../../../secrets/vault.yml   
    - ../../../vars.yml
  vars:
    # Use the IP of your dedicated mgmt-vault-transit VM
    vault_addr: "http://{{ cluster_vault_address }}:8200"
    vault_token: "{{ cluster_vault_root_token }}"
  tags:
    - argocd

  tasks:
    # -------------------------------------------------------------------------
    # 1. Create the ArgoCD Policy
    # -------------------------------------------------------------------------
    - name: Create ArgoCD  policy via CLI
      ansible.builtin.shell: |
        export VAULT_ADDR='http://127.0.0.1:8200'
        export VAULT_TOKEN='{{ cluster_vault_root_token }}'
        vault policy write argocd-policy - <<EOF
        
        path "auth/token/renew-self*" {
          capabilities = ["update"]
        }
        path "auth/token/lookup-self*" {
          capabilities = ["read"]
        }
        # Allow full access to the ArgoCD GitLab secrets
        path "secret/data/argocd/gitlab*" {
          capabilities = ["create", "read", "update", "delete", "list"]
        }
        
        # Essential for Ansible/UI "Preflight" checks
        path "secret/metadata/argocd/gitlab*" {
          capabilities = ["list", "read"]
        }
        EOF
      args:
        executable: /bin/bash

    # -------------------------------------------------------------------------
    # 2. Configure Kubernetes Auth Role (FIXED)
    # -------------------------------------------------------------------------
    - name: Create K8s auth role for ArgoCD via CLI
      ansible.builtin.shell: |
        export VAULT_ADDR='http://127.0.0.1:8200'
        export VAULT_TOKEN='{{ cluster_vault_root_token }}'
        vault write auth/kubernetes/role/argocd-role \
            bound_service_account_names="argocd-repo-server,argocd-server,argocd-application-controller,external-secrets" \
            bound_service_account_namespaces="argocd,external-secrets" \
            policies="argocd-policy" \
            ttl="1h" \
            max_ttl="24h"
      args:
        executable: /bin/bash

    # -------------------------------------------------------------------------
    # 3. Seed GitLab Secrets into KV2
    # -------------------------------------------------------------------------
    - name: Write GitLab group token into Vault KV2 via CLI
      ansible.builtin.shell: |
        export VAULT_ADDR='http://127.0.0.1:8200'
        export VAULT_TOKEN='{{ cluster_vault_root_token }}'
        vault kv put secret/argocd/gitlab \
            url="{{ gitlab_repo_url }}" \
            username="{{ gitlab_user }}" \
            password="{{ gitlab_group_token }}" \
            group="{{ gitlab_group_name }}"
      args:
        executable: /bin/bash
      # no_log: true

    - name: Confirm configuration
      ansible.builtin.debug:
        msg: "Vault CLI configuration complete: Policy, Role, and Secrets established locally."

# =============================================================================
# Play 3: Configure the root app 
# =============================================================================
- name: Bootstrap ArgoCD with External Secrets
  hosts: k3s_master
  become: false
  vars_files:
    - ../../../../secrets/vault.yml   
    - ../../../vars.yml
  tags:
    - argocd 
  tasks:
    # -------------------------------------------------------------------------
    # 1. Create GitLab ExternalSecret
    # -------------------------------------------------------------------------
    - name: Create GitLab ExternalSecret (ArgoCD Repo Credentials)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: gitlab-repo-creds
            namespace: argocd
          spec:
            refreshInterval: "1h"
            secretStoreRef:
              name: vault-backend # Ensure this SecretStore points to your NEW Vault VM IP
              kind: ClusterSecretStore
            target:
              name: gitlab-repo-creds
              template:
                metadata:
                  labels:
                    argocd.argoproj.io/secret-type: repository
                data:
                  # ArgoCD requires these specific keys for Git Auth
                  url: "{% raw %}{{ .url }}{% endraw %}"
                  username: "{% raw %}{{ .username }}{% endraw %}"
                  password: "{% raw %}{{ .password }}{% endraw %}"
                  type: "git"
            data:
              - secretKey: url
                remoteRef:
                  key: argocd/gitlab
                  property: url
              - secretKey: username
                remoteRef:
                  key: argocd/gitlab
                  property: username
              - secretKey: password
                remoteRef:
                  key: argocd/gitlab
                  property: password

    # -------------------------------------------------------------------------
    # 2. Deploy ArgoCD Root Bootstrap Application
    # -------------------------------------------------------------------------
    - name: Deploy ArgoCD Root App (App-of-Apps Pattern)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: argocd-root-bootstrap
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: "{{ gitlab_repo_url }}"
              targetRevision: HEAD
              path: apps # Ensure your cluster-ops repo has this directory
            destination:
              server: 'https://kubernetes.default.svc'
              namespace: argocd
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true