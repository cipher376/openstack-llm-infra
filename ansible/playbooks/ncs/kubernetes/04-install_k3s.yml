---
- name: "Install and Configure K3s Cluster (Master + Workers)"
  hosts: k3s_servers
  become: true
  environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  vars_files:
    - ../../../vars.yml
  tags: 
    - k3s
    - k3s-install
  vars:
    k3s_version: "v1.29.3+k3s1"
    k3s_master_ip: "{{ hostvars['k3s-master-01']['ansible_host'] }}"
    k3s_token_file: "/var/lib/rancher/k3s/server/node-token"
    gpu_taint_key: "dedicated"
    gpu_taint_value: "gpu"
    gpu_taint_effect: "NoExecute"
    api_gate_features: "feature-gates=GatewayAPI=true"
    network_interface: "ens3"

    k3s_workers:
      - name: "gpu-worker-01"
        ip: "{{ hostvars['gpu-worker-01']['ansible_host'] }}"
        labels:
          - "node-role.kubernetes.io/gpu-worker=true"
          - "hardware=gpu"
          - "nvidia.com/gpu=true"
      - name: "k3s-worker-01"
        ip:  "{{ hostvars['k3s-worker-01']['ansible_host'] }}"
        labels:
          - "node-role.kubernetes.io/gitlab=true"
          - "app=gitlab"
  tasks:
    
    - name: Wait for cloud-init to finish
      command: cloud-init status --wait
      changed_when: false
      failed_when: false

    - name: Wait for unattended-upgrades to finish
      shell: |
        while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock 2>/dev/null; do
          echo "Waiting for apt lock to be released..."
          sleep 5
        done
        echo "Lock released"
      changed_when: false
      timeout: 300

# ------------------------------------------------------------------ #
#  SECTION 1 — SYSTEM PREPARATION (ALL NODES)                          #
# ------------------------------------------------------------------ #

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - curl
          - wget
          - git
          - apt-transport-https
          - ca-certificates
          - gnupg
          - open-iscsi
          - nfs-common
          - jq
          - unzip
          - iptables
        state: present

    - name: Enable and start open-iscsi
      systemd:
        name: iscsid
        enabled: yes
        state: started

    - name: Disable swap
      command: swapoff -a
      changed_when: false

    - name: Remove swap from fstab
      lineinfile:
        path: /etc/fstab
        regexp: '.*swap.*'
        state: absent

    - name: Load required kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Persist kernel modules
      copy:
        dest: /etc/modules-load.d/k3s.conf
        mode: '0644'
        content: |
          overlay
          br_netfilter

    - name: Configure sysctl for Kubernetes networking
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { key: "net.bridge.bridge-nf-call-iptables",  value: "1" }
        - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
        - { key: "net.ipv4.ip_forward",                 value: "1" }

    - name: Ensure Python kubernetes library is installed on the Master
      ansible.builtin.package:
        name: python3-kubernetes
        state: present
      become: true
      delegate_to: k3s-master-01
      run_once: true

# ------------------------------------------------------------------ #
#  SECTION 2 — K3s MASTER INSTALLATION                                 #
# ------------------------------------------------------------------ #

    - name: Check if K3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Create K3s configuration directory
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'
      when: ansible_host == k3s_master_ip
      

    - name: Pre-seed K3s configuration (Prevents Traefik auto-install)
      copy:
        dest: /etc/rancher/k3s/config.yaml
        content: |
          cluster-init: true
          bind-address: "{{k3s_master_bind_address}}"
          advertise-address: "{{ k3s_master_ip }}"
          node-ip: "{{ ansible_default_ipv4.address }}"
          cluster-cidr: "{{ pod_cidr }}"
          service-cidr: "{{ service_cidr }}"
          disable:
            - traefik
            - servicelb
          disable-network-policy: true
          flannel-backend: "none"
          write-kubeconfig-mode: "644"
          disable-kube-proxy: true
        mode: '0644'
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml


    - name: Download K3s installation script
      get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: '0755'
      when: ansible_host == k3s_master_ip

    - name: Execute K3s installation script
      ansible.builtin.shell: /tmp/k3s-install.sh
      environment:
        INSTALL_K3S_SKIP_ENABLE: "false"
        INSTALL_K3S_VERSION: "{{ k3s_version }}"
        # This ensures the installer knows you want to use the config file
        K3S_CONFIG_FILE: /etc/rancher/k3s/config.yaml 
      register: k3s_install_result
      # Use 'creates' to make the task idempotent
      args:
        creates: /usr/local/bin/k3s 
      when: ansible_host == k3s_master_ip

    - name: Ensure K3s service is started and enabled
      ansible.builtin.systemd:
        name: k3s
        state: started
        enabled: yes
        daemon_reload: yes
      when: ansible_host == k3s_master_ip


    - name: Display K3s master install result
      debug:
        msg: "{{ k3s_master_install.stdout_lines | default(['K3s master already installed or skipped']) }}"
      when: ansible_host == k3s_master_ip


    - name: Ensure K3s master service is enabled and started
      systemd:
        name: k3s
        enabled: yes
        state: started
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml



    - name: Wait for node token to be generated
      wait_for:
        path: "{{ k3s_token_file }}"
        timeout: 120
        delay: 10
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml


    - name: Taint Master Node to prevent general workloads
      kubernetes.core.k8s_taint:
        state: present
        name: "{{ inventory_hostname }}"
        taints:
          - key: "node-role.kubernetes.io/master"
            effect: "NoSchedule"
          - key: "node-role.kubernetes.io/control-plane"
            effect: "NoSchedule"
      delegate_to: k3s-master-01
      run_once: true
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

# ------------------------------------------------------------------ #
#  SECTION 3 — KUBECONFIG (MASTER ONLY)                                #
# ------------------------------------------------------------------ #

    - name: Create .kube directory for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      when: ansible_host == k3s_master_ip

    - name: Copy kubeconfig for ubuntu user
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/ubuntu/.kube/config
        remote_src: yes
        owner: ubuntu
        group: ubuntu
        mode: '0600'
      when: ansible_host == k3s_master_ip

    - name: Update kubeconfig server address
      replace:
        path: /home/ubuntu/.kube/config
        regexp: 'https://127.0.0.1:6443'
        replace: "https://{{ k3s_master_ip }}:6443"
      when: ansible_host == k3s_master_ip

    - name: Set KUBECONFIG in ubuntu bashrc
      lineinfile:
        path: /home/ubuntu/.bashrc
        line: 'export KUBECONFIG=/home/ubuntu/.kube/config'
        state: present
      when: ansible_host == k3s_master_ip

    - name: Set KUBECONFIG in ubuntu profile
      lineinfile:
        path: /home/ubuntu/.profile
        line: 'export KUBECONFIG=/home/ubuntu/.kube/config'
        state: present
      when: ansible_host == k3s_master_ip

   
# ------------------------------------------------------------------ #
#  SECTION 8 — FETCH TOKEN AND DISTRIBUTE TO WORKERS                   #
# ------------------------------------------------------------------ #

    - name: Read K3s node token from master
      command: "sudo cat {{ k3s_token_file }}"
      register: k3s_token
      changed_when: false
      when: ansible_host == k3s_master_ip

    - name: Save token locally on control machine
      ansible.builtin.copy:
        content: "{{ k3s_token.stdout }}"
        dest: "/tmp/k3s-node-token"
        mode: '0600'
      delegate_to: localhost
      become: false
      when: ansible_host == k3s_master_ip

    - name: Display node token saved location
      debug:
        msg: "K3s node token saved to /tmp/k3s-node-token Token {{k3s_token.stdout}}"
      when: ansible_host == k3s_master_ip

# ------------------------------------------------------------------ #
# SECTION 10 — K3s WORKER INSTALLATION                               #
# ------------------------------------------------------------------ #
    - name: Read saved token for worker installation
      set_fact:
        worker_token: "{{ lookup('file', '/tmp/k3s-node-token') | default('dummy-token-for-master') }}"
      when: ansible_host != k3s_master_ip
    
    - name: Validate token is not empty
      assert:
        that:
          - worker_token is defined
          - worker_token | length > 0
        fail_msg: "K3s token is empty or invalid."
      when: ansible_host != k3s_master_ip
    
    - name: Check if K3s agent is already installed on worker
      stat:
        path: /usr/local/bin/k3s
      register: k3s_agent_binary
      when: ansible_host != k3s_master_ip

    - name: Download K3s install script on worker
      get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: '0755'
      when:
        - ansible_host != k3s_master_ip
        - not (k3s_agent_binary.stat.exists | default(false))

    
    - name: Install K3s agent on worker node
      shell: |
        INSTALL_K3S_CHANNEL={{ k3s_version }} \
        K3S_URL="https://{{ k3s_master_ip }}:6443" \
        K3S_TOKEN="{{ worker_token }}" \
        INSTALL_K3S_EXEC="agent --node-ip={{ ansible_host }}" \
        /tmp/k3s-install.sh 
      when:
        - ansible_host != k3s_master_ip
        - not (k3s_agent_binary.stat.exists | default(false))
      become: true

    
    - name: Restart K3s agent to pick up
      systemd:
        name: k3s-agent
        state: restarted
      when: 
        - ansible_host != k3s_master_ip
# ------------------------------------------------------------------ #
#  SECTION 4 — INSTALL HELM (MASTER ONLY)                            #
# ------------------------------------------------------------------ #

    - name: Check if Helm is installed
      command: which helm
      register: helm_check
      failed_when: false
      changed_when: false
      when: ansible_host == k3s_master_ip

    - name: Download Helm install script
      get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get-helm-3.sh
        mode: '0755'
      when:
        - ansible_host == k3s_master_ip
        - helm_check.rc != 0

    - name: Install Helm
      command: /tmp/get-helm-3.sh
      when:
        - ansible_host == k3s_master_ip
        - helm_check.rc != 0
      register: helm_install
      changed_when: helm_install.rc == 0

    - name: Verify Helm version
      command: helm version
      register: helm_version
      changed_when: false
      when: ansible_host == k3s_master_ip

    - name: Display Helm version
      debug:
        msg: "{{ helm_version.stdout_lines }}"
      when: ansible_host == k3s_master_ip


# ------------------------------------------------------------------ #
#  SECTION 5 — INSTALL CILIUM CLI (MASTER ONLY)                        #
# ------------------------------------------------------------------ #

    - name: Check if Cilium CLI is installed
      command: which cilium
      register: cilium_cli_check
      failed_when: false
      changed_when: false
      when: ansible_host == k3s_master_ip

    - name: Download and install Cilium CLI
      shell: |
        CILIUM_CLI_VERSION=$(curl -s https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt)
        curl -L --remote-name-all \
          https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-amd64.tar.gz
        tar -xzvf cilium-linux-amd64.tar.gz -C /usr/local/bin
        rm cilium-linux-amd64.tar.gz
        echo "Cilium CLI installed"
      args:
        chdir: /tmp
      when:
        - ansible_host == k3s_master_ip
        - cilium_cli_check.rc != 0
      register: cilium_cli_install
      changed_when: "'Cilium CLI installed' in cilium_cli_install.stdout"

# ------------------------------------------------------------------ #
#  SECTION 6 — INSTALL CILIUM CNI (MASTER ONLY)                        #
# ------------------------------------------------------------------ #

    
    - name: Install Gateway API CRDs fresh using kubectl
      shell: |
        kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.1.0/experimental-install.yaml
      become: true
      delegate_to: k3s-master-01
      run_once: true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: gateway_install
      changed_when: "'created' in gateway_install.stdout"
      when: ansible_host == k3s_master_ip
      


    - name: Add Cilium Helm repo
      shell: |
        helm repo add cilium https://helm.cilium.io/
        helm repo update
        echo "Cilium repo added"
      register: cilium_repo
      changed_when: "'Cilium repo added' in cilium_repo.stdout"
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Check if Cilium is already installed
      shell: |
        helm list -n kube-system | grep cilium && echo exists || echo missing
      register: cilium_check
      changed_when: false
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Install Cilium via Helm
      kubernetes.core.helm:
        name: cilium
        chart_ref: cilium/cilium
        chart_version: "{{ cilium_version }}"
        namespace: kube-system
        create_namespace: true
        wait: false
        wait_timeout: 7m  # Increased for Proxmox/Disk latency
        values:
          operator:
            replicas: 1
            prometheus:
              enabled: true
            rollOutPods: true
            hostNetwork: true  # ← ADD THIS
            # extraEnv:
            #   - name: KUBERNETES_SERVICE_HOST
            #     value: "{{ k3s_master_ip }}"
            #   - name: KUBERNETES_SERVICE_PORT
            #     value: "6443"

          # REQUIRED: Since we disabled kube-proxy in K3s
          kubeProxyReplacement: true
          k8sServiceHost: "{{ k3s_master_ip }}"
          k8sServicePort: 6443

          # CRITICAL: Specify which network interface to use
          devices: "{{ network_interface }}"

          # Networking Tweaks for VXLAN
          routingMode: tunnel
          tunnelProtocol: vxlan
          ipv4NativeRoutingCIDR: "{{ pod_cidr }}"

          # Allow nodes to communicate across the CIDR
          # autoDirectNodeRoutes: true #Cannot be used with tunnling

          ipam:
            mode: kubernetes
            operator:
              clusterPoolIPv4PodCIDRList:
                - "{{ pod_cidr }}"
              clusterPoolIPv4MaskSize: 24

          # CRITICAL: Enable endpoint routes for better performance with K3s
          endpointRoutes:
            enabled: true

          # Gateway API & Ingress
          gatewayAPI:
            enabled: true
            secretsNamespace:
              name: cilium-secrets

          # L2 Announcements (Allows your Home Lab to see Service IPs)
          l2announcements:
            enabled: true
            interfaces:
              - "{{ network_interface }}"
          
          externalIPs:
            enabled: true

          # LoadBalancer & Proxy Settings
          loadBalancer:
            # algorithm: maglev
            # mode: snat  # ← CHANGED FROM dsr TO snat
            l7:
              enabled: true
              backend: envoy
              port: 8080

          # LoadBalancer IP Pool configuration
          ipPool:
            - name: default-pool
              spec:
                cidr: "{{cilium_lb_ip_range}}"
                allowFirstLastIPs: "Yes"

          socketLB:
            enabled: true
          nodePort:
            enabled: true
          hostServices:
            enabled: true

          # Enable hubble 
          hubble:
            enabled: true
            relay:
              enabled: true
            ui:
              enabled: true 
            metrics:
              enabled:
                - dns
                - drop
                - tcp
                - flow
                - port-distribution
                - icmp
                - http
            

          # Envoy proxy (used by Gateway API)
          envoy:
            enabled: true
            rollOutPods: true

          rollOutCiliumPods: true

          # cluster:
          #   name: default
          #   id: 0

          # Prometheus metrics for debugging
          prometheus:
            enabled: true
            serviceMonitor:
              enabled: false
              trustCRDsExist: false

      #  when:
      #   - "'missing' in cilium_check.stdout"
      delegate_to: k3s-master-01
      run_once: true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Wait for Cilium pods to be ready
      shell: |
        kubectl wait pod \
          --namespace kube-system \
          --selector=k8s-app=cilium \
          --for=condition=ready \
          --timeout=300s
        echo "Cilium pods ready"
      register: cilium_wait
      changed_when: false
      failed_when: false
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml


# 2. Fix the missing Cilium EndpointSlice CRD from your logs
    - name: Install Cilium EndpointSlice CRD (if using Cilium 1.15+)
      kubernetes.core.k8s:
        state: present
        src: https://raw.githubusercontent.com/cilium/cilium/v1.15/pkg/k8s/apis/cilium.io/client/crds/v2alpha1/ciliumendpointslices.yaml
      delegate_to: k3s-master-01
      run_once: true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display Cilium wait result
      debug:
        msg: "{{ cilium_wait.stdout_lines }}"
      when: ansible_host == k3s_master_ip

# ------------------------------------------------------------------ #
#  SECTION 7 — CILIUM L2 ANNOUNCEMENTS AND GATEWAY CONFIG (MASTER ONLY) #
# ------------------------------------------------------------------ #
    - name: Create Cilium Gateway with Pool Annotation
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata:
            name: cilium-gateway
            namespace: cilium-secrets
            # annotations:
            #   # This tells Cilium exactly which pool to pull from
            #   io.cilium/lb-ipam-ips: "172.16.0.200" # Choose one from your /27 range
          spec:
            gatewayClassName: cilium
            listeners:
              - name: http
                protocol: HTTP
                port: 80
                hostname: "*.lab.lan"
                allowedRoutes:
                  namespaces:
                    from: All
      become: true
      delegate_to: k3s-master-01
      run_once: true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Create Cilium GatewayClass
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: GatewayClass
          metadata:
            name: cilium
          spec:
            controllerName: io.cilium/gateway-controller
      become: true
      delegate_to: k3s-master-01
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Create Cilium L2 Announcement Policy
      kubernetes.core.k8s:
        state: present
        definition:
          - apiVersion: "cilium.io/v2alpha1"
            kind: CiliumLoadBalancerIPPool
            metadata:
              name: "homelab-pool"
            spec:
              blocks:
                - cidr: "{{ cilium_lb_ip_range }}" 
          - apiVersion: cilium.io/v2alpha1
            kind: CiliumL2AnnouncementPolicy
            metadata:
              name: homelab-l2-policy
              namespace: kube-system
            spec:
              # Matches any interface starting with 'e' (eth0, enp3s0, etc.)
              interfaces:
                - eth0 # Matches eth0 (Common on VMs/Master)
              externalIPs: true
              loadBalancerIPs: true
              # This links the policy to your existing pool
              # serviceSelector:
              #   matchLabels:
              #     io.cilium.static-ip: "true" # Optional, or leave empty for all
      become: true
      delegate_to: k3s-master-01
      run_once: true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
 
  
# ------------------------------------------------------------------ #
#  SECTION 9 — LABEL WORKER NODES (FROM MASTER)                       #
# ------------------------------------------------------------------ #

    - name: Wait for all nodes to join the cluster
      shell: "kubectl get nodes --no-headers | wc -l"
      register: node_count
      until: node_count.stdout | int >= 2
      retries: 20
      delay: 15
      delegate_to: k3s-master-01
      run_once: true

    - name: Wait for nodes to reach 'Ready' status
      shell: "kubectl get nodes | grep -v 'NotReady' | wc -l"
      register: ready_count
      until: ready_count.stdout | int >= 3 # +1 for the header/master
      retries: 10
      delay: 10
      delegate_to: k3s-master-01
      run_once: true


    - name: Apply labels to worker nodes
      command: >
        kubectl label node {{ item.0.name }} {{ item.1 }} --overwrite
      loop: "{{ k3s_workers | subelements('labels') }}"
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: label_result
      run_once: true
      delegate_to: k3s-master-01
      changed_when: "'labeled' in label_result.stdout"


    - name: Display label results
      debug:
        msg: "{{ label_result.results | map(attribute='stdout') | list }}"
      when: ansible_host == k3s_master_ip


# ------------------------------------------------------------------ #
#  SECTION 10 — VERIFICATION (MASTER ONLY)                           #
# ------------------------------------------------------------------ #
  
    - name: Check all nodes status
      shell: kubectl get nodes -o wide
      register: node_status
      changed_when: false
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display all nodes
      debug:
        msg: "{{ node_status.stdout_lines }}"
      when: ansible_host == k3s_master_ip

    - name: Check all pods
      shell: kubectl get pods -A
      register: pod_status
      changed_when: false
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display pod status
      debug:
        msg: "{{ pod_status.stdout_lines }}"
      when: ansible_host == k3s_master_ip

    - name: Run Cilium status check
      shell: cilium status --wait
      register: cilium_status
      changed_when: false
      failed_when: false
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display Cilium status
      debug:
        msg: "{{ cilium_status.stdout_lines }}"
      when: ansible_host == k3s_master_ip

    - name: Check Helm releases
      shell: helm list -A
      register: helm_releases
      changed_when: false
      when: ansible_host == k3s_master_ip
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml

    - name: Display Helm releases
      debug:
        msg: "{{ helm_releases.stdout_lines }}"
      when: ansible_host == k3s_master_ip

    

# ------------------------------------------------------------------ #
#  SECTION 12 — FINAL SUMMARY                                        #
# ------------------------------------------------------------------ #

    - name: Master node summary
      debug:
        msg:
          - "================================================"
          - "K3s cluster setup complete"
          - "================================================"
          - "Master:            {{ k3s_master_ip }}"
          - "API server:        https://{{ k3s_master_ip }}:6443"
          - "Kubeconfig:        /home/ubuntu/.kube/config"
          - "CNI:               Cilium {{ cilium_version }}"
          - "Ingress:           Cilium Ingress Controller"
          - "Load Balancer:     Cilium L2 Announcements"
          - "LB IP range:       {{ cilium_lb_ip_range }}"
      when: ansible_host == k3s_master_ip

    - name: Worker node summary
      debug:
        msg:
          - "================================================"
          - "K3s agent configured on {{ inventory_hostname }}"
          - "Node IP:    {{ ansible_host }}"
          - "Master:     https://{{ k3s_master_ip }}:6443"
          - "Status:     joined cluster"
          - "================================================"
      when: ansible_host != k3s_master_ip

