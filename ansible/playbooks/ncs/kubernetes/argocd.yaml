# =============================================================================
# Play 1: INSTALL ARGOCD
# =============================================================================

- name: "Install and Configure Gitlab Runner on K3s Cluster (Master + Workers)"
  hosts: k3s_servers
  become: true
  vars_files:
      - ../vars/hc-vault_keys.json
  vars:
    gitlab_argocd_token: "{{gitlab_group_token}}"
    gitlab_argo_group_name: "{{gitlab_group_name}}"
    gitlab_server: "172.16.0.102"
  tasks:
    - name: Validate GitLab Deployement token
      assert:
        that:
          - gitlab_argocd_token is defined
          - gitlab_argocd_token | length > 20
          - gitlab_argocd_token is search('^glpat-') # Ensures it's not a raw string
        fail_msg: "Deployment token is missing or incorrectly decrypted! Ensure you used --vault-password-file."
        success_msg: "GitLab Deployment token validated successfully."
      run_once: true

    - name: Add ArgoCD Helm Repository
      kubernetes.core.helm_repository:
        name: argo
        repo_url: "https://argoproj.github.io/argo-helm"
      # This ensures the repo is added to the Helm config on the master node
      delegate_to: k3s-master-01
      run_once: true

    - name: Deploy ArgoCD via Helm
      kubernetes.core.helm:
        name: argocd
        chart_ref: argo/argo-cd
        release_namespace: argocd
        create_namespace: true
        # In a lab, we often disable forced TLS to make Ingress easier
        values:
          server:
            extraArgs:
              - --insecure 
          configs:
            params:
              server.insecure: "true"
      delegate_to: k3s-master-01
      run_once: true
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    

    - name: Wait for ArgoCD Server to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        wait: yes
        namespace: argocd
        label_selectors:
          - app.kubernetes.io/name=argocd-server
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300
      become: true
      delegate_to: k3s-master-01
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      run_once: true


    - name: Expose ArgoCD via Cilium Gateway
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            name: argocd-route
            namespace: argocd
          spec:
            parentRefs:
              - name: cilium-gateway
                namespace: cilium-secrets
            hostnames:
              - "argocd.lab.lan"
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
                backendRefs:
                  - name: argocd-server
                    port: 80
      become: true
      delegate_to: k3s-master-01
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      run_once: true
    
    
# =============================================================================
# Play 2: Configure initial policies for Argocd
# =============================================================================


- name: Configure Vault for Argocd
  hosts: k3s_servers[0]
  become: false
  run_once: true
  collections:
    - community.hashi_vault
  vars_files:
      - ../vars/hc-vault_keys.json
  vars:
    kube_config: "/etc/rancher/k3s/k3s.yaml"
    k8s_ca_cert_cmd: >
      kubectl get configmap kube-root-ca.crt -n kube-system
      -o jsonpath='{.data.ca\.crt}'
    k8s_sa_jwt_cmd: >
      kubectl exec -n {{ vault_namespace }} vault-0 --
      cat /var/run/secrets/kubernetes.io/serviceaccount/token
    k8s_host_cmd: >
      kubectl config view --raw
      -o jsonpath='{.clusters[0].cluster.server}'
    vault_addr: "http://vault.vault.svc.cluster.local:8200"
    gitlab_url: "{{gitlab_url}}"
    vault_token: "{{root_token}}"
    vault_namespace: vault
    environment:
      KUBECONFIG: "{{ kube_config }}"  
    
  tasks:

        
    # -------------------------------------------------------------------------
    # ArgoCD read policy
    # vault_policy removed in community.hashi_vault 7.x — use kubectl exec
    # -------------------------------------------------------------------------
    - name: Apply ArgoCD read policy (Atomic Zero-Footprint)
      ansible.builtin.shell: |
        kubectl exec -i -n {{ vault_namespace }} vault-0 -- /bin/sh -c \
        "VAULT_ADDR='{{ vault_addr }}' VAULT_TOKEN='{{ vault_token }}' vault policy write argocd-read-policy -" <<EOF
        path "secret/data/argocd/gitlab" {
          capabilities = ["read"]
        }
        path "auth/token/renew-self" {
          capabilities = ["update"]
        }
        path "auth/token/lookup-self" {
          capabilities = ["read"]
        }
        EOF
      environment:
        KUBECONFIG: "{{ kube_config }}"
      no_log: true
      delegate_to: k3s-master-01

    # -------------------------------------------------------------------------
    # K8s auth role — binds argocd service accounts to the policy
    # vault_kubernetes_auth_role removed in 7.x — use kubectl exec
    # -------------------------------------------------------------------------
    - name: Configure Kubernetes auth role for ArgoCD
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_namespace }} vault-0 -- /bin/sh -c \
        "VAULT_ADDR='{{ vault_addr }}' VAULT_TOKEN='{{ vault_token }}' \
        vault write auth/kubernetes/role/argocd-role \
        bound_service_account_names=argocd-repo-server,argocd-server,argocd-application-controller \
        bound_service_account_namespaces=argocd \
        policies=argocd-read-policy \
        ttl=1h \
        max_ttl=24h"
      environment:
        KUBECONFIG: "{{ kube_config }}"
      no_log: true
      delegate_to: k3s-master-01

    # -------------------------------------------------------------------------
    # Seed GitLab group token into Vault KV
    # vault_kv2_write still exists in 7.x — keep using the collection module
    # -------------------------------------------------------------------------
    - name: Check if GitLab secret already exists
      ansible.builtin.shell:
        cmd: "kubectl exec -n {{ vault_namespace }} vault-0 -- /bin/sh -c 'VAULT_TOKEN={{ vault_token }} vault kv get secret/argocd/gitlab'"
      register: vault_check
      failed_when: false
      changed_when: false
      no_log: true

   

    - name: Write GitLab group token into Vault KV
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_namespace }} vault-0 -- /bin/sh -c \
        "VAULT_TOKEN='{{ vault_token }}' vault kv put -mount=secret argocd/gitlab \
        url='{{ gitlab_repo_url }}' \
        username='{{ gitlab_user }}' \
        password='{{ gitlab_group_token }}' \
        group='{{ gitlab_group_name }}'"
      # no_log: true
      delegate_to: k3s-master-01

    - name: Verify secret was written to Vault KV
      ansible.builtin.shell: |
        kubectl exec -n {{ vault_namespace }} vault-0 -- /bin/sh -c \
        "VAULT_ADDR='{{ vault_addr }}' VAULT_TOKEN='{{ vault_token }}' \
        vault kv get secret/argocd/gitlab"
      environment:
        KUBECONFIG: "{{ kube_config }}"
      register: kv_check
      changed_when: false
      failed_when: kv_check.rc != 0
      no_log: true
      delegate_to: k3s-master-01

    - name: Confirm GitLab group token written
      ansible.builtin.debug:
        msg: "GitLab group token '{{ gitlab_group_name }}' seeded at secret/data/argocd/gitlab"

# =============================================================================
# Play 3: Configure the root app 
# =============================================================================

- name: Configure the root application to link to gitlab cluster-ops repo
  hosts: k3s_servers
  become: false
  run_once: true
  collections:
    - community.hashi_vault
  vars:
    kube_config: "/etc/rancher/k3s/k3s.yaml"
  vars_files:
      - ../vars/hc-vault_keys.json
  tasks:
    
    - name: Create GitLab ExternalSecret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: gitlab-repo-creds
            namespace: argocd
          spec:
            refreshInterval: "1h"
            secretStoreRef:
              name: vault-backend
              kind: ClusterSecretStore
            target:
              name: gitlab-repo-creds
              template:
                metadata:
                  labels:
                    argocd.argoproj.io/secret-type: repository
                data:
                  # These keys MUST match what ArgoCD expects
                  url: "{% raw %}{{ .url }}{% endraw %}"
                  username: "{% raw %}{{ .username }}{% endraw %}"
                  password: "{% raw %}{{ .password }}{% endraw %}"
                  type: "git"
            data:
              - secretKey: url
                remoteRef:
                  key: argocd/gitlab
                  property: url
              - secretKey: username
                remoteRef:
                  key: argocd/gitlab
                  property: username
              - secretKey: password
                remoteRef:
                  key: argocd/gitlab
                  property: password
      delegate_to: k3s-master-01

    
    - name: Deploy ArgoCD Root Bootstrap Application
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: argocd-root-bootstrap
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: '{{gitlab_repo_url}}'
              targetRevision: HEAD
              path: apps
            destination:
              server: 'https://kubernetes.default.svc'
              namespace: argocd
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
      delegate_to: k3s-master-01